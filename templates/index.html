<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webhook Events</title>
</head>

<body>
    <h1>Webhook Events</h1>
    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Request ID</th>
                <th>Author</th>
                <th>Action</th>
                <th>From Branch</th>
                <th>To Branch</th>
                <th>Timestamp</th>
            </tr>
        </thead>
        <tbody>
            {% for event in events %}
            <tr>
                <td>{{ event._id }}</td>
                <td>{{ event.request_id }}</td>
                <td>{{ event.author }}</td>
                <td>{{ event.action }}</td>
                <td>{{ event.from_branch }}</td>
                <td>{{ event.to_branch }}</td>
                <td>{{ event.timestamp }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>

</html>
